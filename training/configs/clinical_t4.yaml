# Single source of truth for the clinical fine-tune.
# Read by `notebooks/kaggle_t4_train.ipynb`, `data/prepare_medmcqa.py`,
# `merge.py`, `eval/*.py`, and `convert_to_gguf.sh`.

model:
  hf_id: "google/gemma-4-E2b-it"
  # 4-bit QLoRA isn't stable on Gemma 4 yet (Unsloth warns explicitly).
  # 16-bit fits on T4 16 GB only with grad checkpointing + small batch.
  load_in_16bit: true
  load_in_4bit: false

data:
  hf_id: "openlifescienceai/medmcqa"
  split: "train"
  # MedMCQA train has ~194k examples. Sub-sampling keeps the run under
  # Kaggle's 12-hour session limit. Bump cautiously.
  train_count: 40000
  eval_count: 400
  seed: 3407
  # Only keep examples with an explanation field for richer rationales.
  require_explanation: true
  out_dir: "/kaggle/working/data"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  max_seq_length: 1024            # T4 OOMs past this for Gemma 4 E2B
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8  # effective batch = 8
  warmup_ratio: 0.03
  num_train_epochs: 2             # 2 is plenty; 5 overfits on 40k MCQs
  learning_rate: 2.0e-4           # standard Unsloth LoRA recipe
  optim: "adamw_8bit"
  use_gradient_checkpointing: "unsloth"
  logging_steps: 25
  save_strategy: "epoch"
  seed: 3407
  output_dir: "/kaggle/working/outputs_clinical"

output:
  adapter_dir: "/kaggle/working/outputs_clinical/adapter"
  merged_dir: "/kaggle/working/outputs_clinical/merged_bf16"
  gguf_path:  "/kaggle/working/outputs_clinical/sobahealth-clinical-q4_k_m.gguf"

# Set in Kaggle Secrets, then loaded in the notebook.
huggingface:
  push_repo: "sobahealth/sobahealth-clinical"  # change to your namespace
  push_private: true
